name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - run: npm run check:index
      - run: git diff --exit-code -- . ':!data' ':!rag-evaluation' ':!artifacts' ':!*.png' ':!*.webp' ':!*.json' ':!public/wiki-ux-meta.json' ':!src/generated/*' || (echo "Uncommitted generated or source drift detected" && exit 1)