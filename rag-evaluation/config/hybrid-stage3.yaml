# Stage-3 Hybrid Search experiment configuration
datasetPath: rag-evaluation/datasets/golden_queries.v1.jsonl
datasetVersion: golden_queries.v1
# Frozen Stage-2 operational index (structure-aware-v1)
vectorIndexPath: data/rag/indexes/structure-aware-v1.json
contextualIndexPath: data/rag/indexes/structure-aware-contextual-v1.json
retrievalModeDefault: baseline
topK: 5
lexicalTopN: 30
vectorTopN: 30
# RRF grid (narrow)
rrfGrid:
  - { rrfK: 60, lexicalWeight: 1.0, vectorWeight: 1.0, id: rrf60-bal }
  - { rrfK: 20, lexicalWeight: 1.0, vectorWeight: 1.0, id: rrf20-bal }
  - { rrfK: 60, lexicalWeight: 1.2, vectorWeight: 1.0, id: rrf60-lex }
  - { rrfK: 60, lexicalWeight: 1.0, vectorWeight: 1.2, id: rrf60-vec }
# Diversification settings
diversifyGrid:
  - { id: off, maxChunksPerDocument: 0, documentDeduplication: false }
  - { id: max1, maxChunksPerDocument: 1, documentDeduplication: true }
  - { id: max2, maxChunksPerDocument: 2, documentDeduplication: true }
# Named candidates evaluated end-to-end
candidates:
  - id: vector-only-structure-aware
    mode: baseline
    index: vector
  - id: lexical-only
    mode: lexical
    index: vector
  - id: hybrid-rrf
    mode: hybrid-raw
    index: vector
    useBestRrf: true
  - id: hybrid-diversify
    mode: hybrid-raw
    index: vector
    useBestRrf: true
    diversify: max2
  - id: hybrid-contextual
    mode: hybrid-raw
    index: contextual
    useBestRrf: true
  - id: hybrid-contextual-diversify
    mode: hybrid-raw
    index: contextual
    useBestRrf: true
    diversify: max2
updateBest: false
updateOperational: false
